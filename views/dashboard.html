<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="InkQuest Dashboard - Manage your personal library and reading lists.">
    <title>Dashboard - InkQuest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo" onclick="window.location.href='/'">Ink<span>Quest</span></h1>
            <div class="nav-actions">
                <a href="/" class="btn-outline">Back to Search</a>
                <button type="button" id="btn-logout" class="btn-primary">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="app-container">
        <div class="dash-card" style="max-width: 1000px; padding: 2rem;">
            <h2 class="dash-card-title">Welcome back, <span id="dash-username">Explorer</span>!</h2>
            <p class="dash-card-text">Here are the books you've liked on InkQuest.</p>
            
            <div id="liked-loader" class="loader hidden"></div>
            <div id="liked-error" class="error-message hidden"></div>
            
            <div id="liked-books-grid" class="book-grid">
                <!-- Liked books will be injected here -->
            </div>
            <p id="no-likes-msg" class="hidden" style="color: var(--text-secondary); text-align: center; margin-top: 2rem;">You haven't liked any books yet. Go search for some!</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token    = localStorage.getItem('inkquest_token');
            const username = localStorage.getItem('inkquest_username');
            const name     = localStorage.getItem('inkquest_name') || username;

            // Redirect to home if not logged in
            if (!token || !username) {
                window.location.href = '/';
                return;
            }

            document.getElementById('dash-username').textContent = name;

            document.getElementById('btn-logout').addEventListener('click', () => {
                localStorage.removeItem('inkquest_token');
                localStorage.removeItem('inkquest_username');
                localStorage.removeItem('inkquest_name');
                window.location.href = '/';
            });

            // Fetch and render liked books
            const loader = document.getElementById('liked-loader');
            const errorMsg = document.getElementById('liked-error');
            const grid = document.getElementById('liked-books-grid');
            const noLikesMsg = document.getElementById('no-likes-msg');

            loader.classList.remove('hidden');

            try {
                const response = await fetch('/api/users/liked-books', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();

                if (response.ok) {
                    if (data.likedBooks && data.likedBooks.length > 0) {
                        data.likedBooks.forEach(book => {
                            const card = document.createElement('div');
                            card.className = 'book-card';
                            
                            const coverUrl = book.coverId 
                                ? `https://covers.openlibrary.org/b/id/${book.coverId}-M.jpg` 
                                : null;

                            card.innerHTML = `
                                <div class="book-cover-container">
                                    ${coverUrl
                                        ? `<img src="${coverUrl}" alt="Cover of ${book.title}" class="book-cover" loading="lazy">`
                                        : `<div class="placeholder-cover">No Cover</div>`
                                    }
                                </div>
                                <h3 class="book-title">${book.title}</h3>
                                <p class="book-author">${book.author}</p>
                                ${book.firstPublishYear ? `<span class="book-year">${book.firstPublishYear}</span>` : ''}
                            `;
                            grid.appendChild(card);
                        });
                    } else {
                        noLikesMsg.classList.remove('hidden');
                    }
                } else {
                    errorMsg.textContent = data.error || 'Failed to fetch liked books.';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'Network error while fetching liked books.';
                errorMsg.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
